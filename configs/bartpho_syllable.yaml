model_name: vinai/bartpho-syllable
run_name: bartpho-syllable-finance-number-safe
output_dir: outputs/bartpho-syllable
prefix: ""
max_source_length: 1024
max_target_length: 256
generation:
  num_beams: 5
  length_penalty: 0.9
  no_repeat_ngram_size: 3
  min_ratio: 0.20
  max_ratio: 0.25
training:
  num_train_epochs: 5
  learning_rate: 2.0e-5
  weight_decay: 0.01
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.06
  eval_strategy: epoch
  save_strategy: epoch
  logging_steps: 50
  predict_with_generate: true
  fp16: true
lora:
  enabled: false
  r: 16
  alpha: 32
  dropout: 0.05

