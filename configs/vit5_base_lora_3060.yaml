model_name: VietAI/vit5-base
run_name: vit5-base-lora-cafef-stock-3060
output_dir: outputs/vit5-base-lora-cafef-stock
prefix: "summarize: "
max_source_length: 512
max_target_length: 256
generation:
  num_beams: 2
  length_penalty: 1.0
  no_repeat_ngram_size: 3
  min_ratio: 0.20
  max_ratio: 0.25
training:
  num_train_epochs: 3
  learning_rate: 1.0e-4
  weight_decay: 0.01
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  warmup_ratio: 0.06
  eval_strategy: epoch
  save_strategy: epoch
  logging_steps: 25
  predict_with_generate: true
  fp16: true
  gradient_checkpointing: true
  eval_accumulation_steps: 8
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q
    - v
